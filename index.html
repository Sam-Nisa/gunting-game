<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Metal Fury v2 - Ultimate Edition</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="gameWrap">
        <div id="ui">
            <div class="hpWrap">❤️ <div id="healthBar">
                    <div id="healthFill" style="width:100%"></div>
                </div>
            </div>
            <div><span id="weaponIcon">🔫</span> <span id="weaponName">RIFLE</span> | AMO:<span
                    id="ammoDisplay">∞</span></div>
            <div id="grenadeDisplay">💣 <span id="grenadeDisplay2">3</span></div>
            <div>💀 <span id="killsDisplay">0</span></div>
            <div>🧡 <span id="livesDisplay">3</span></div>
            <div>⭐ <span id="scoreDisplay">0</span></div>
            <div style="color: gold">🪙 <span id="coinDisplay">0</span></div>
            <!-- MODIFIED: Wrapped right side controls for better layout -->
            <div class="rightControls">
                <div>🌊 WAVE <span id="waveDisplay">1</span></div>
                <div id="inGameSoundToggle" class="soundToggle" onclick="toggleSound()">🔊</div>
            </div>
        </div>
        <canvas id="gameCanvas" width="900" height="480"></canvas>
        <div id="controls">
            <span class="controlChip"><strong>A/D</strong> ←/→ Move</span>
            <span class="controlChip"><strong>W/↑</strong> Jump</span>
            <span class="controlChip"><strong>SPACE</strong> Shoot</span>
            <span class="controlChip"><strong>SHIFT</strong> Dash</span>
            <span class="controlChip"><strong>G</strong> Grenade</span>
            <span class="controlChip"><strong>Q</strong> Weapon</span>
            <span class="controlChip"><strong>M</strong> Sound</span>
            <span class="controlChip"><strong>B</strong> Shop</span>
        </div>
        <div id="overlay">
            <h1>⚡ METAL FURY</h1>
            <p class="sub">Ultimate Edition — Survive the jungle assault</p>
            <div id="leaderboard">
                <h3>🏆 HIGH SCORES</h3>
                <ul id="lbList">
                    <li>— No scores yet —</li>
                </ul>
            </div>
            <!-- NEW: Settings Controls -->
            <div class="settingsWrap">
                <div class="difficultySelect">
                    <span>DIFFICULTY:</span>
                    <button id="diffEasy" class="diffBtn" onclick="setDifficulty('easy')">EASY</button>
                    <button id="diffNormal" class="diffBtn active" onclick="setDifficulty('normal')">NORMAL</button>
                    <button id="diffHard" class="diffBtn" onclick="setDifficulty('hard')">HARD</button>
                </div>
                <div class="actionRow">
                    <button id="soundToggleBtn" class="actionBtn" onclick="toggleSound()">🔊 SOUND</button>
                    <button class="actionBtn" onclick="toggleShop()">🛒 SHOP</button>
                </div>
            </div>
            <button class="btn" onclick="startGame()">▶ START GAME</button>
        </div>
        <div id="waveAnnounce"></div>
    </div>

    <script src="audio.js"></script>
    <script src="state.js"></script>
    <script src="entities.js"></script>
    <script src="render.js"></script>
    <script src="game.js"></script>
</body>

</html>
